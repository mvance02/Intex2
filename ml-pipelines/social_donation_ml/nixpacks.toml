[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["/opt/venv/bin/python train_export.py"]

[start]
cmd = "/opt/venv/bin/python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT"
