name: ML Nightly Retrain

# Runs daily at 2am UTC. Can also be triggered manually from the Actions tab.
# Retrains all three ML pipelines, regenerates prediction artifacts, and
# commits them back to main so the .NET API serves fresh scores automatically.

on:
  schedule:
    - cron: "0 2 * * *"   # 2am UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  retrain:
    name: Retrain ML Pipelines
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-pipelines

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-pipelines/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyarrow joblib xgboost

      # ── Pipeline 1: Donor Retention Risk ─────────────────────────────────────
      - name: Train donor churn model (Ch. 15 three-pass)
        run: python scripts/train_donor_churn.py --data_dir data --out_dir outputs/donor_retention

      - name: Export donor risk scores to backend JSON
        run: python scripts/export_donor_risk_json.py

      # ── Pipeline 2: Social Donation ML ───────────────────────────────────────
      - name: Train social donation model
        run: python social_donation_ml/train_export.py

      # ── Pipeline 3: First Visit Personalizer ─────────────────────────────────
      - name: Train first visit personalizer
        run: python scripts/train_first_visit_personalizer.py

      # ── Commit updated artifacts ──────────────────────────────────────────────
      # [skip ci] prevents this commit from re-triggering the CI workflow.
      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            outputs/donor_retention/donor_risk_scores.parquet \
            outputs/donor_retention/metrics.json \
            outputs/donor_retention/feature_importance.csv \
            social_donation_ml/artifacts/ \
            outputs/first_visit_personalizer/ \
            ../backend/HopeHaven.API/Infrastructure/donor_risk_scores.json
          git diff --cached --quiet || git commit -m "chore: nightly ML retrain [skip ci]"
          git push
